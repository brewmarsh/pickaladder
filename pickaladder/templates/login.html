{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
    const googleSignInButton = document.getElementById('google-signin-btn');
    const form = document.querySelector('form');
    const loginBtn = document.getElementById('login-submit-btn');
    const loginBtnText = loginBtn.querySelector('.button-text');
    const loginBtnSpinner = loginBtn.querySelector('.spinner-border');

    // Loading indicator logic from fix branch
    function setLoading(loading) {
        if (loading) {
            loginBtn.disabled = true;
            loginBtnText.textContent = 'Logging in...';
            loginBtnSpinner.classList.remove('d-none');
        } else {
            loginBtn.disabled = false;
            loginBtnText.textContent = 'Login';
            loginBtnSpinner.classList.add('d-none');
        }
    }

    // Consolidated Success logic
    function handleLoginSuccess() {
        const urlParams = new URLSearchParams(window.location.search);
        const nextUrl = urlParams.get('next');
        if (nextUrl && nextUrl.startsWith('/')) {
            window.location.href = nextUrl;
        } else {
            window.location.href = "{{ url_for('user.dashboard') }}";
        }
    }

    // Google Sign-in logic: Merged with syncSession and async error handling
    googleSignInButton.addEventListener('click', async function() {
        const provider = new firebase.auth.GoogleAuthProvider();
        const remember = document.getElementById('remember').checked;
        localStorage.setItem('rememberMe', remember);

        try {
            const result = await firebase.auth().signInWithPopup(provider);
            const idToken = await result.user.getIdToken();
            
            // Store token for consistency with layout.html fetch interceptor
            localStorage.setItem('firebaseIdToken', idToken);
            
            // Use main's global syncSession to resolve race conditions
            await syncSession(idToken, remember);
            handleLoginSuccess();
        } catch (error) {
            console.error("Google Sign-in error:", error);
            const flashes = document.querySelector('.flashes');
            flashes.innerHTML = `<div class="alert alert-danger">Google Sign-in failed: ${error.message}</div>`;
        }
    });

    // Email/Password login: Merged with syncSession and detailed error parsing
    form.addEventListener('submit', async function (event) {
        event.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const remember = document.getElementById('remember').checked;
        localStorage.setItem('rememberMe', remember);

        setLoading(true);

        try {
            const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
            const idToken = await userCredential.user.getIdToken();
            
            localStorage.setItem('firebaseIdToken', idToken);
            
            // Execute global session sync
            await syncSession(idToken, remember);
            handleLoginSuccess();
        } catch (error) {
            console.error("Login error:", error);
            setLoading(false);

            const errorCode = error.code;
            let errorMessage = error.message;

            // Attempt to parse JSON error message (Fix branch logic)
            if (typeof errorMessage === 'string' && errorMessage.startsWith('{')) {
                try {
                    const parsedError = JSON.parse(errorMessage);
                    errorMessage = parsedError.error?.message || parsedError.message || errorMessage;
                } catch (e) { /* ignore */ }
            }

            const flashes = document.querySelector('.flashes');
            flashes.innerHTML = '';
            const flash = document.createElement('div');
            flash.className = 'alert';

            const invalidCredentialsCodes = [
                'auth/wrong-password',
                'auth/user-not-found',
                'auth/invalid-login-credentials',
                'INVALID_LOGIN_CREDENTIALS'
            ];

            if (errorCode === 'auth/user-disabled') {
                flash.classList.add('alert-warning');
                flash.textContent = 'Please verify your email address before logging in.';
            } else if (invalidCredentialsCodes.includes(errorCode) || invalidCredentialsCodes.includes(errorMessage)) {
                flash.classList.add('alert-danger');
                flash.textContent = 'Invalid email or password.';
            } else {
                flash.classList.add('alert-danger');
                flash.textContent = `Login failed: ${errorMessage}`;
            }
            flashes.appendChild(flash);
        }
    });
});
</script>
{% endblock %}
