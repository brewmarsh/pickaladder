<!-- pickaladder/templates/tournament/_partner_modal.html -->
<div class="modal fade" id="partnerModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Pick a Partner</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form action="{{ url_for('tournament.register_team', tournament_id=tournament.id) }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="team_name">Team Name (Optional)</label>
                        <input type="text" name="team_name" id="team_name" class="form-control" placeholder="e.g. The Smashers">
                    </div>
                    <div class="form-group">
                        <label for="partner_id">Select Partner</label>
                        <select name="partner_id" id="partner_id" class="form-control" required>
                            <option value="" disabled selected>Choose a friend...</option>
                            {% for friend in invitable_users %}
                                <option value="{{ friend.id }}">{{ friend | smart_display_name }}</option>
                            {% endfor %}
                        </select>
                        <small class="text-muted">Only your friends are shown here.</small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Invite Partner</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function openPartnerModal() {
    $('#partnerModal').modal('show');
}
</script>
