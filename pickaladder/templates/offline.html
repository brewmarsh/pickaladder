{% extends "layout.html" %}

{% block title %}Offline{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0 p-5">
                <div class="mb-4">
                    <i class="fas fa-wifi-slash fa-5x text-muted mb-3"></i>
                    <h2 class="font-weight-bold">You're Offline</h2>
                    <p class="text-muted">It looks like you've lost your internet connection.</p>
                </div>

                <div class="alert alert-volt mb-4" style="background-color: var(--accent-color); color: var(--text-on-accent); border: none; border-radius: var(--border-radius);">
                    <p class="mb-0"><strong>Pickaladder</strong> is currently in offline mode. Some features may be unavailable until you're back online.</p>
                </div>

                <div class="mt-4">
                    <button onclick="window.location.reload()" class="btn btn-volt px-5">
                        <i class="fas fa-sync-alt mr-2"></i> Try Again
                    </button>
                </div>

                <div class="mt-4">
                    <a href="/" class="text-decoration-none text-muted">
                        <i class="fas fa-arrow-left mr-1"></i> Back to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
