<div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="feedbackModalLabel">Give Feedback</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form id="feedbackForm">
                    <div class="form-group">
                        <label for="feedbackType">Feedback Type</label>
                        <select class="form-control" id="feedbackType" required>
                            <option value="General">General</option>
                            <option value="Bug">Bug Report</option>
                            <option value="Feature Request">Feature Request</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="feedbackMessage">Message</label>
                        <textarea class="form-control" id="feedbackMessage" rows="4" required placeholder="Tell us what's on your mind..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" id="submitFeedback">
                    <span id="feedbackLoading" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                    Submit Feedback
                </button>
            </div>
        </div>
    </div>
</div>
