<div class="vanity-stats-container justify-content-center gap-4">
    <div class="vanity-stat">
        <div class="stat-value fs-large fw-bold">{{ stats.total_games }}</div>
        <div class="stat-label text-muted fs-xxs text-uppercase ls-1">Matches</div>
    </div>
    <div class="vanity-stat">
        <div class="stat-value fs-large fw-bold">{{ stats.win_rate | round | int }}%</div>
        <div class="stat-label text-muted fs-xxs text-uppercase ls-1">Win %</div>
    </div>
    <div class="vanity-stat">
        <div class="stat-value fs-large fw-bold text-volt">
            {% if stats.total_games > 0 %}
                {{ current_streak }}{{ 'W' if current_streak > 0 else 'L' if current_streak < 0 else '' }}
            {% else %}
                —
            {% endif %}
        </div>
        <div class="stat-label text-muted fs-xxs text-uppercase ls-1">Streak</div>
    </div>
</div>
