{% macro empty_state(icon, title, message, action_url=None, action_text=None) %}
<div class="empty-state text-center py-5 px-4 card border-none shadow-sm">
    <div class="card-body">
        <div class="empty-state-icon fs-giant mb-3" style="opacity: 0.2;">{{ icon }}</div>
        <h3 class="empty-state-title fw-bold mb-2">{{ title }}</h3>
        <p class="empty-state-message text-muted mb-4 mx-auto" style="max-width: 400px;">{{ message }}</p>
        {% if action_url and action_text %}
        <div class="d-flex justify-content-center">
            <a href="{{ action_url }}" class="btn btn-volt w-auto px-4">{{ action_text }}</a>
        </div>
        {% endif %}
    </div>
</div>
{% endmacro %}
