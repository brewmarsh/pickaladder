name: Agent Readiness Scorecard

on:
  pull_request:
    branches:
      - main
      - beta
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # Nightly at 02:00 UTC on beta

permissions:
  contents: read
  pull-requests: write

jobs:
  agent-readiness:
    name: Agent Readiness Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11' # tool requires 3.10+

      - name: Install Tool
        run: |
          uv pip install tree-sitter tree-sitter-javascript tree-sitter-typescript tree-sitter-python --system
          uv pip install git+https://github.com/brewmarsh/agent-readiness-scorecard.git --system

      - name: Run Agent Scorecard
        env:
          UV_SYSTEM_PYTHON: 1
        run: |
          # Ensure we have the base branch reference locally for comparison
          git fetch origin ${{ github.base_ref || 'main' }}
          
          # Determine target for logging purposes
          TARGET_BRANCH="origin/${{ github.base_ref || 'main' }}"
          echo "Running Agent Scorecard against $TARGET_BRANCH..."
          
          # Use --diff for PRs to focus on changes and limit to Python files
          DIFF_ARG=""
          if [ "${{ github.event_name }}" == pull_request ]; then
            DIFF_ARG="--diff"
          fi

          # Standardized command syntax targeting only Python files
          uv run --no-project agent-score score $DIFF_ARG --report readiness_report.md . --limit-to .py

      - name: Check for Report existence
        id: check_report
        run: |
          if [ -f readiness_report.md ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Artifact
        if: steps.check_report.outputs.exists == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: agent-readiness-report
          path: readiness_report.md

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.check_report.outputs.exists == 'true'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: agent-readiness-report
          path: readiness_report.md