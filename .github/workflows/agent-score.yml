name: Agent Readiness Scorecard

on:
  pull_request:

jobs:
  agent-score:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11' # tool requires 3.10+

      - name: Install agent-readiness-scorecard
        run: uv pip install git+https://github.com/brewmarsh/agent-readiness-scorecard.git --system

      - name: Run agent-score and check threshold
        env:
          UV_SYSTEM_PYTHON: 1
        run: |
          # Ensure we have the base branch reference locally for comparison
          git fetch origin ${{ github.base_ref || 'main' }}

          # Run with --diff to analyze only changed files and avoid crashes in unrelated JS files
          SCORE=$(uv run --no-project agent-score score --diff . | grep "Final Agent Score" | awk '{print $4}' | cut -d'/' -f1)

          if [ -z "$SCORE" ]; then
            echo "Could not determine agent score"
            exit 1
          fi

          if (( $(echo "$SCORE < 75" | bc -l) )); then
            echo "Agent score of $SCORE is below the threshold of 75"
            exit 1
          fi
